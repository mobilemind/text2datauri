# See the documentation for Dependabot version updates configuration options:
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuring-dependabot-version-updates
#
# Note: This package has ZERO production dependencies
# devDependencies are linting tools (@eslint/js, eslint, eslint-plugin-n, markdownlint-cli2)
---
version: 2
updates:
  # npm dependency monitoring - monthly check for devDependency updates
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "04:08"  # Avoid peak hours
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    reviewers:
      - "mobilemind"

  # GitHub Actions updates - monthly
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "05:08"  # Staggered 1 hour from npm
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "github-actions"
      - "dependencies"
    reviewers:
      - "mobilemind"
